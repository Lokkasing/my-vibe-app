<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding | EOSE Portfolio</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        h1 { font-size: 1.8rem; margin-bottom: 20px; text-align: center; }
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 25px; 
            border-radius: 20px; 
            backdrop-filter: blur(15px);
            text-align: center;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        #clock { font-size: 1.2rem; color: #00ffff; margin-bottom: 15px; font-family: monospace; }
        .data { font-size: 1.1rem; margin: 8px 0; }
        .profit { color: #00ff88; font-weight: bold; }
        .loss { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

    <h1>明天开始 vibe coding！</h1>
    
    <div class="card">
        <div id="clock">--:--:--</div>
        <div id="price" class="data">加载 EOSE 价格中...</div>
        <div id="pnl" class="data">--</div>
    </div>

    <script>
        // 你的核心资产数据
        const holdings = 670;
        const costPrice = 11.97;

        async function updateDashboard() {
            // 1. 更新时间
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });

            // 2. 获取 EOSE 价格 (这里使用 eose 作为 ID，若接口无数据，请检查该币种在 CoinGecko 的确切 ID)
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=eose&vs_currencies=usd');
                const data = await res.json();
                
                // 检查数据是否存在
                if (data.eose && data.eose.usd) {
                    const currentPrice = data.eose.usd;
                    const totalPnL = (currentPrice - costPrice) * holdings;
                    
                    document.getElementById('price').innerText = `EOSE 现价: $${currentPrice.toFixed(2)}`;
                    
                    const pnlEl = document.getElementById('pnl');
                    pnlEl.className = totalPnL >= 0 ? 'data profit' : 'data loss';
                    pnlEl.innerText = `总盈亏: ${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}`;
                } else {
                    document.getElementById('price').innerText = "EOSE 实时数据暂缺";
                    document.getElementById('pnl').innerText = "请检查代号是否正确";
                }
            } catch (e) {
                document.getElementById('price').innerText = "网络连接异常";
            }
        }

        // 5秒刷新一次
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
