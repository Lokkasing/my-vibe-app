<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Weather</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: sans-serif;
        }
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 25px; 
            backdrop-filter: blur(15px);
            text-align: center;
            width: 80%;
            max-width: 350px;
        }
        #location { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        #weather { font-size: 3rem; margin: 10px 0; }
        #time { font-size: 1rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="card">
        <div id="location">正在定位...</div>
        <div id="weather">--°C</div>
        <div id="time">--:--:--</div>
    </div>

    <script>
        // 获取地理位置及城市名
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                
                // 1. 反向地理编码：通过经纬度获取城市名
                const geoUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=zh-CN`;
                
                try {
                    const geoRes = await fetch(geoUrl);
                    const geoData = await geoRes.json();
                    const country = geoData.address.country || "";
                    const city = geoData.address.city || geoData.address.town || geoData.address.district || "未知区域";
                    document.getElementById('location').innerText = `${country} · ${city}`;
                    
                    // 2. 获取天气
                    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`;
                    const weatherRes = await fetch(weatherUrl);
                    const weatherData = await weatherRes.json();
                    document.getElementById('weather').innerText = `${weatherData.current_weather.temperature}°C`;
                } catch (e) {
                    document.getElementById('location').innerText = "获取信息失败";
                }
            });
        }

        // 更新时间
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        }, 1000);
    </script>
</body>
</html>
