<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding | Weather</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 25px; 
            backdrop-filter: blur(15px);
            text-align: center;
            width: 80%;
            max-width: 350px;
        }
        #time { font-size: 1.2rem; color: #00ffff; margin-bottom: 10px; }
        #weather { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        #location { font-size: 1rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card">
        <div id="time">获取时间中...</div>
        <div id="location">定位中...</div>
        <div id="weather">---</div>
    </div>

    <script>
        // 更新时间
        function updateTime() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 获取地理位置并展示 (这里使用浏览器自带的 Geolocation API)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                document.getElementById('location').innerText = `纬度: ${latitude.toFixed(2)}, 经度: ${longitude.toFixed(2)}`;
                
                // 使用 Open-Meteo 免费天气 API，无需复杂的 API Key
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    document.getElementById('weather').innerText = `${data.current_weather.temperature}°C`;
                } catch (e) {
                    document.getElementById('weather').innerText = "天气获取失败";
                }
            }, () => {
                document.getElementById('location').innerText = "定位权限被拒绝";
            });
        } else {
            document.getElementById('location').innerText = "浏览器不支持定位";
        }
    </script>
</body>
</html>
