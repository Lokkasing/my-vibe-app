<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>剁手计算器 · 多目标版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 20px 16px 28px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1e2b;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }
        h1 span {
            background: #fee9e7;
            color: #e35f5a;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 40px;
        }
        .card {
            background: #f8fafd;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #2f3a4c;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-field {
            margin-bottom: 14px;
        }
        .input-field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #5f6c84;
            margin-bottom: 5px;
        }
        .input-field input {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 40px;
            background: white;
            outline: none;
        }
        .input-field input:focus { border-color: #e35f5a; }

        /* 累计收入区域 */
        .accumulated-row {
            background: linear-gradient(135deg, #eef6fb, #ffffff);
            border-radius: 40px;
            padding: 16px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #d4e4f0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .accumulated-label {
            font-size: 16px;
            font-weight: 600;
            color: #1e3b5c;
        }
        .accumulated-value {
            font-size: 28px;
            font-weight: 800;
            color: #1e6f5c;
        }
        /* 起始时间行 */
        .start-time-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            width: 100%;
            justify-content: space-between;
        }
        .start-time-row label {
            font-size: 13px;
            color: #3b5a7c;
            white-space: nowrap;
        }
        .start-time-row input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 13px;
            background: white;
        }

        /* 每秒/每分钟 同一行 */
        .rate-row {
            display: flex;
            background: white;
            border-radius: 40px;
            padding: 14px 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            gap: 12px;
        }
        .rate-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .rate-label {
            font-size: 14px;
            color: #4a5a6e;
        }
        .rate-value {
            font-size: 20px;
            font-weight: 700;
            color: #1a1e2b;
        }
        .rate-value small {
            font-size: 12px;
            font-weight: 400;
            color: #8a9bb5;
        }

        /* 商品卡片 */
        .goal-card {
            background: white;
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #e6ecf2;
            transition: all 0.2s;
        }
        .goal-card.green { background-color: #e6f7e6; border-left: 6px solid #2ecc71; }
        .goal-card.yellow { background-color: #fef9e7; border-left: 6px solid #f1c40f; }
        .goal-card.red { background-color: #fdedec; border-left: 6px solid #e35f5a; }

        .goal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .goal-header input {
            flex: 1 1 40%;
            min-width: 120px;
            padding: 8px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            background: white;
        }
        .goal-header input:focus { border-color: #e35f5a; }
        .delete-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #a0b3cc;
            cursor: pointer;
            padding: 0 6px;
            line-height: 1;
        }
        .delete-btn:hover { color: #e35f5a; }

        .goal-progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        progress {
            flex: 1;
            height: 18px;
            border-radius: 40px;
            overflow: hidden;
        }
        progress::-webkit-progress-bar { background-color: #e2e8f0; border-radius: 40px; }
        progress::-webkit-progress-value { background-color: #e35f5a; border-radius: 40px; }

        .goal-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #3a4c62;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .goal-worktime {
            font-size: 13px;
            font-weight: 500;
            color: #1f2a3f;
            background: #f0f4fe;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
        }
        .add-btn {
            background: white;
            border: 2px dashed #cbd5e1;
            border-radius: 40px;
            padding: 14px;
            width: 100%;
            font-size: 16px;
            color: #5f6c84;
            font-weight: 500;
            cursor: pointer;
            margin: 6px 0 14px;
            transition: all 0.2s;
        }
        .add-btn:hover {
            border-color: #e35f5a;
            color: #e35f5a;
            background: #fff4f3;
        }
        .footnote {
            font-size: 12px;
            color: #8a9bb5;
            text-align: center;
            margin-top: 20px;
        }

        /* Toast 样式 */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="toast">仅支持输入数字</div>

    <div class="container" id="app">
        <h1>剁手计算器 <span>v3.3</span></h1>

        <!-- 累计收入 + 起始时间 -->
        <div class="accumulated-row">
            <div style="display: flex; flex-direction: column; width: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span class="accumulated-label">⏳ 累计收入</span>
                    <span class="accumulated-value" id="accumulatedAmount">¥0.00</span>
                </div>
                <div class="start-time-row">
                    <label>📅 从</label>
                    <input type="datetime-local" id="startTimeInput">
                </div>
            </div>
        </div>

        <!-- 月薪设置 -->
        <div class="card">
            <div class="section-title">⚙️ 月薪设置</div>
            <div class="input-field">
                <label>💰 月薪（元）</label>
                <input type="number" id="monthlySalary" value="28000" min="0" step="1000">
            </div>
            <p style="font-size:12px; color:#8a9bb5; margin-top:-8px;">按月平均到每秒（按30天/月计算）</p>
        </div>

        <!-- 每秒/每分钟合并行 -->
        <div class="rate-row">
            <div class="rate-item">
                <span class="rate-label">每秒赚</span>
                <span class="rate-value" id="perSecond">¥0.00</span>
            </div>
            <div class="rate-item">
                <span class="rate-label">每分钟赚</span>
                <span class="rate-value" id="perMinute">¥0.00</span>
            </div>
        </div>

        <!-- 攒钱目标模块（移除了忍住按钮） -->
        <div class="card" style="padding-bottom: 10px;">
            <div class="section-title">🎯 攒钱目标</div>

            <!-- 商品列表容器 -->
            <div id="goalList"></div>

            <!-- 添加商品按钮 -->
            <button class="add-btn" id="addGoalBtn">+ 添加商品</button>

            <!-- 注：之前这里的“忍住没买”按钮已移除 -->
        </div>

        <div class="footnote">所有设置自动保存 · 花钱前看一眼</div>
    </div>

    <script>
        (function() {
            // ----- DOM 元素 -----
            const monthlySalaryInput = document.getElementById('monthlySalary');
            const perSecondSpan = document.getElementById('perSecond');
            const perMinuteSpan = document.getElementById('perMinute');
            const accumulatedSpan = document.getElementById('accumulatedAmount');
            const startTimeInput = document.getElementById('startTimeInput');
            const goalListDiv = document.getElementById('goalList');
            const addGoalBtn = document.getElementById('addGoalBtn');
            const toast = document.getElementById('toast');

            // ----- 常量 -----
            const SECONDS_PER_MONTH = 30 * 24 * 3600; // 按30天/月

            // ----- 本地存储键名 -----
            const STORAGE_KEYS = {
                monthlySalary: 'daoshou_monthlySalary',
                startTime: 'daoshou_startTime',
                goals: 'daoshou_goals',
            };

            // ----- 全局变量 -----
            let timerInterval = null;
            let goals = [];
            let nextId = 100;

            // ----- 辅助：显示toast -----
            function showToast(message) {
                toast.innerText = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ----- 辅助：格式化日期时间 -----
            function formatDateTimeForInput(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${year}-${month}-${day}T${hours}:${minutes}`;
            }

            // ----- 获取起始时间 -----
            function getStartTime() {
                const saved = localStorage.getItem(STORAGE_KEYS.startTime);
                if (saved) {
                    const d = new Date(saved);
                    if (!isNaN(d.getTime())) return d;
                }
                const defaultStart = new Date();
                defaultStart.setHours(0, 0, 0, 0);
                return defaultStart;
            }

            // ----- 加载设置 -----
            function loadSettings() {
                if (localStorage.getItem(STORAGE_KEYS.monthlySalary)) {
                    monthlySalaryInput.value = localStorage.getItem(STORAGE_KEYS.monthlySalary);
                }
                const start = getStartTime();
                startTimeInput.value = formatDateTimeForInput(start);

                const savedGoals = localStorage.getItem(STORAGE_KEYS.goals);
                if (savedGoals) {
                    try {
                        goals = JSON.parse(savedGoals);
                        goals = goals.map(g => ({ ...g, id: g.id || nextId++ }));
                    } catch (e) {
                        goals = [];
                    }
                } else {
                    goals = [
                        { id: nextId++, name: 'Switch', price: 2500 },
                        { id: nextId++, name: 'iPhone 15', price: 8000 },
                    ];
                }
                renderGoals();
            }

            function saveSettings() {
                localStorage.setItem(STORAGE_KEYS.monthlySalary, monthlySalaryInput.value);
                localStorage.setItem(STORAGE_KEYS.goals, JSON.stringify(goals));
                if (startTimeInput.value) {
                    localStorage.setItem(STORAGE_KEYS.startTime, new Date(startTimeInput.value).toISOString());
                }
            }

            // ----- 计算每秒收入 -----
            function getPerSecondRate() {
                const monthly = parseFloat(monthlySalaryInput.value) || 0;
                return monthly / SECONDS_PER_MONTH;
            }

            // ----- 计算累计收入 -----
            function getAccumulatedSinceStart() {
                const startTimeStr = startTimeInput.value;
                if (!startTimeStr) return 0;
                const startDate = new Date(startTimeStr);
                if (isNaN(startDate.getTime())) return 0;
                const now = new Date();
                const secondsPassed = Math.max(0, Math.floor((now - startDate) / 1000));
                return getPerSecondRate() * secondsPassed;
            }

            // ----- 更新累计显示（每秒调用）-----
            function updateAccumulated() {
                const accumulated = getAccumulatedSinceStart();
                accumulatedSpan.innerText = '¥' + accumulated.toFixed(2);
                // 更新所有商品卡片的动态数据
                updateAllGoalCards(accumulated);
            }

            // ----- 更新每秒/每分钟显示 -----
            function updateRates() {
                const perSecond = getPerSecondRate();
                perSecondSpan.innerText = '¥' + perSecond.toFixed(2);
                perMinuteSpan.innerText = '¥' + (perSecond * 60).toFixed(2);
            }

            // ----- 根据价格和月薪获取卡片样式类（新分级逻辑）-----
            function getPriceColorClass(price, monthlySalary) {
                if (monthlySalary <= 0) return 'green'; // 月薪未设置时默认绿色
                const ratio = (price / monthlySalary) * 100;
                if (ratio >= 10) return 'red';
                if (ratio >= 5) return 'yellow';
                return 'green';
            }

            // ----- 更新所有商品卡片的进度、金额、工作时间、颜色（不重建DOM）-----
            function updateAllGoalCards(accumulated) {
                const monthlySalary = parseFloat(monthlySalaryInput.value) || 0;
                goals.forEach((goal, index) => {
                    const card = document.querySelector(`.goal-card[data-id="${goal.id}"]`);
                    if (!card) return;
                    const price = goal.price || 0;
                    const percent = price > 0 ? Math.min(100, (accumulated / price) * 100) : 0;
                    const hours = price > 0 ? (price / getPerSecondRate() / 3600) : 0;
                    const h = Math.floor(hours);
                    const m = Math.round((hours - h) * 60);
                    const timeStr = (price === 0) ? '0 小时 0 分钟' : `${h} 小时 ${m} 分钟`;

                    // 更新进度条
                    const progress = card.querySelector('progress');
                    if (progress) {
                        progress.value = percent;
                        progress.nextElementSibling.innerText = percent.toFixed(1) + '%';
                    }

                    // 更新已赚/目标金额
                    const statsSpan = card.querySelector('.goal-stats span:first-child');
                    if (statsSpan) {
                        statsSpan.innerText = `已赚: ¥${accumulated.toFixed(2)} / ¥${price.toFixed(2)}`;
                    }

                    // 更新时间
                    const worktimeSpan = card.querySelector('.goal-worktime');
                    if (worktimeSpan) {
                        worktimeSpan.innerText = `⏱️ ${timeStr}`;
                    }

                    // 更新卡片颜色类
                    const colorClass = getPriceColorClass(price, monthlySalary);
                    card.className = `goal-card ${colorClass}`;
                    card.setAttribute('data-id', goal.id);
                });
            }

            // ----- 过滤价格输入（只允许数字和小数点）-----
            function filterPriceInput(value) {
                let filtered = value.replace(/[^\d.]/g, '');
                const parts = filtered.split('.');
                if (parts.length > 2) {
                    filtered = parts[0] + '.' + parts.slice(1).join('');
                }
                return filtered;
            }

            // ----- 渲染商品列表（首次或增删时调用）-----
            function renderGoals() {
                const accumulated = getAccumulatedSinceStart();
                const monthlySalary = parseFloat(monthlySalaryInput.value) || 0;
                let html = '';
                goals.forEach(goal => {
                    const price = goal.price || 0;
                    const percent = price > 0 ? Math.min(100, (accumulated / price) * 100) : 0;
                    const hours = price > 0 ? (price / getPerSecondRate() / 3600) : 0;
                    const h = Math.floor(hours);
                    const m = Math.round((hours - h) * 60);
                    const timeStr = (price === 0) ? '0 小时 0 分钟' : `${h} 小时 ${m} 分钟`;
                    const colorClass = getPriceColorClass(price, monthlySalary);

                    html += `
                        <div class="goal-card ${colorClass}" data-id="${goal.id}">
                            <div class="goal-header">
                                <input type="text" class="goal-name" value="${escapeHtml(goal.name)}" placeholder="商品名称">
                                <input type="text" class="goal-price" value="${price}" inputmode="numeric" data-id="${goal.id}" placeholder="价格">
                                <button class="delete-btn" onclick="deleteGoal(${goal.id})">✕</button>
                            </div>
                            <div class="goal-progress-row">
                                <progress value="${percent}" max="100">${percent}%</progress>
                                <span class="goal-percent">${percent.toFixed(1)}%</span>
                            </div>
                            <div class="goal-stats">
                                <span>已赚: ¥${accumulated.toFixed(2)} / ¥${price.toFixed(2)}</span>
                                <span class="goal-worktime">⏱️ ${timeStr}</span>
                            </div>
                        </div>
                    `;
                });
                goalListDiv.innerHTML = html;

                // 绑定商品名称输入事件
                document.querySelectorAll('.goal-name').forEach((input, index) => {
                    input.addEventListener('input', (e) => {
                        goals[index].name = e.target.value;
                        saveSettings();
                    });
                });

                // 绑定价格输入事件：实时过滤非法字符并提示；失焦时校验>0
                document.querySelectorAll('.goal-price').forEach(input => {
                    input.addEventListener('input', function(e) {
                        const rawValue = e.target.value;
                        const filtered = filterPriceInput(rawValue);
                        if (filtered !== rawValue) {
                            e.target.value = filtered;
                            showToast('仅支持输入数字');
                        }
                    });

                    input.addEventListener('blur', function(e) {
                        const id = parseInt(e.target.dataset.id);
                        const goal = goals.find(g => g.id === id);
                        if (!goal) return;

                        let newPrice = parseFloat(e.target.value);
                        // 如果输入无效或为0/负数，恢复原价并提示
                        if (isNaN(newPrice) || e.target.value.trim() === '' || newPrice <= 0) {
                            e.target.value = goal.price;
                            if (newPrice <= 0) {
                                showToast('价格必须大于0');
                            } else {
                                showToast('仅支持输入数字');
                            }
                            return;
                        }
                        if (newPrice !== goal.price) {
                            goal.price = newPrice;
                            saveSettings();
                            // 重新渲染以更新颜色（价格变化影响颜色）
                            renderGoals();
                        }
                    });
                });
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }

            // ----- 删除商品 -----
            window.deleteGoal = function(id) {
                goals = goals.filter(g => g.id !== id);
                saveSettings();
                renderGoals();
            };

            // ----- 添加商品 -----
            function addGoal() {
                goals.push({
                    id: nextId++,
                    name: '新商品',
                    price: 1000,  // 默认价格1000，避免为0
                });
                saveSettings();
                renderGoals();
            }

            // ----- 事件绑定（静态元素）-----
            monthlySalaryInput.addEventListener('input', () => {
                updateRates();
                updateAccumulated();
                // 月薪变化会影响颜色，重新渲染（或调用updateAllGoalCards更新颜色）
                // 直接重新渲染更简单，确保颜色正确
                renderGoals();
                saveSettings();
            });
            startTimeInput.addEventListener('input', () => {
                updateAccumulated();
                saveSettings();
            });
            addGoalBtn.addEventListener('click', addGoal);

            // ----- 定时器每秒更新累计收入，但不重新渲染列表 -----
            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    updateAccumulated();
                }, 1000);
            }

            // ----- 初始化 -----
            window.addEventListener('load', function() {
                loadSettings();
                updateRates();
                updateAccumulated();
                startTimer();
            });

            window.addEventListener('beforeunload', function() {
                if (timerInterval) clearInterval(timerInterval);
            });

            window.deleteGoal = deleteGoal;
        })();
    </script>
</body>
</html>
