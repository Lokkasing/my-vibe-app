<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>剁手计算器 · 日式极简</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f3f1ed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            line-height: 1.5;
            color: #3e3a36;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            padding: 28px 20px 32px;
            border: 1px solid #e8e4da;
        }
        h1 {
            font-size: 26px;
            font-weight: 600; /* 加粗 */
            letter-spacing: 0.02em;
            color: #4a4540;
            margin-bottom: 24px;
            border-bottom: 1px solid #e0dbd1;
            padding-bottom: 16px;
        }
        .card {
            background: #f9f7f4;
            border-radius: 18px;
            padding: 20px 18px;
            margin-bottom: 20px;
            border: 1px solid #ebe6df;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600; /* 加粗 */
            color: #6d6157;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }
        .input-field {
            margin-bottom: 16px;
        }
        .input-field label {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: #7b6f64;
            margin-bottom: 6px;
        }
        .input-field input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #dbd3c9;
            border-radius: 40px;
            background: white;
            outline: none;
            transition: border-color 0.15s;
        }
        .input-field input:focus {
            border-color: #b7aa9c;
        }
        .accumulated-row {
            background: #f5f2ed;
            border-radius: 40px;
            padding: 16px 22px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2dbd2;
        }
        .accumulated-label {
            font-size: 16px;
            font-weight: 600; /* 加粗 */
            color: #6b5f54;
        }
        .accumulated-value {
            font-size: 28px;
            font-weight: 500;
            color: #4c6b5f;
        }
        .start-time-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            width: 100%;
            justify-content: space-between;
        }
        .start-time-row label {
            font-size: 13px;
            color: #7f7266;
            white-space: nowrap;
        }
        .start-time-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d7cec3;
            border-radius: 40px;
            font-size: 13px;
            background: white;
            color: #3e3a36;
        }
        .rate-row {
            display: flex;
            background: white;
            border-radius: 40px;
            padding: 14px 20px;
            margin-bottom: 20px;
            border: 1px solid #ece6de;
        }
        .rate-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .rate-label {
            font-size: 14px;
            color: #8c7f72;
            font-weight: 400;
        }
        .rate-value {
            font-size: 20px;
            font-weight: 500;
            color: #4f5d55;
        }
        .goal-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e9e2d9;
            transition: background 0.1s;
        }
        .goal-card.green {
            background-color: #f6f9f4;
            border-left: 4px solid #b7c9b1;
        }
        .goal-card.yellow {
            background-color: #fcf9f0;
            border-left: 4px solid #e0cfb1;
        }
        .goal-card.red {
            background-color: #fdf5f2;
            border-left: 4px solid #e3bcb4;
        }
        .goal-header {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .goal-header input {
            flex: 1 1 40%;
            min-width: 120px;
            padding: 10px 14px;
            border: 1px solid #dbd3c9;
            border-radius: 40px;
            font-size: 14px;
            background: white;
        }
        .goal-header input:focus {
            border-color: #b7aa9c;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #bfb2a4;
            cursor: pointer;
            padding: 0 6px;
            line-height: 1;
        }
        .delete-btn:hover {
            color: #a28e7c;
        }
        .goal-progress-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        progress {
            flex: 1;
            height: 8px;
            border-radius: 20px;
            overflow: hidden;
            background-color: #e4ddd4;
            border: none;
        }
        progress::-webkit-progress-bar {
            background-color: #e4ddd4;
            border-radius: 20px;
        }
        progress::-webkit-progress-value {
            background-color: #9faea5;
            border-radius: 20px;
        }
        progress::-moz-progress-bar {
            background-color: #9faea5;
            border-radius: 20px;
        }
        .goal-percent {
            font-size: 15px;
            font-weight: 400;
            color: #6f655b;
            min-width: 48px;
            text-align: right;
        }
        .goal-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #7f7368;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .goal-worktime {
            font-size: 13px;
            font-weight: 400;
            color: #7c6e62;
            background: #f0ebe5;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .add-btn {
            background: #ffffff;
            border: 1px dashed #cbc1b5;
            border-radius: 40px;
            padding: 14px;
            width: 100%;
            font-size: 15px;
            color: #94897e;
            font-weight: 400;
            cursor: pointer;
            margin: 12px 0 8px;
            transition: background 0.2s;
        }
        .add-btn:hover {
            background: #f7f3ef;
            border-color: #b7aa9c;
        }
        .footnote {
            font-size: 12px;
            color: #b0a69b;
            text-align: center;
            margin-top: 28px;
            border-top: 1px solid #ece6de;
            padding-top: 18px;
        }
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(80, 70, 60, 0.9);
            color: #f0ebe4;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(2px);
            letter-spacing: 0.3px;
        }
        #toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="toast">仅支持输入数字</div>

    <div class="container" id="app">
        <h1>剁手计算器</h1>  <!-- 去掉了“日式版” -->

        <!-- 累计收入 + 起始时间 -->
        <div class="accumulated-row">
            <div style="display: flex; flex-direction: column; width: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span class="accumulated-label">⏳ 累计收入</span>
                    <span class="accumulated-value" id="accumulatedAmount">¥0.00</span>
                </div>
                <div class="start-time-row">
                    <label>📅 从</label>
                    <input type="datetime-local" id="startTimeInput">
                </div>
            </div>
        </div>

        <!-- 月薪设置 -->
        <div class="card">
            <div class="section-title">⚙️ 月薪设置</div>
            <div class="input-field">
                <label>💰 月薪（元）</label>
                <input type="number" id="monthlySalary" value="28000" min="0" step="1000">
            </div>
            <p style="font-size:12px; color:#a99f94; margin-top:-8px;">按月平均到每秒（按30天/月计算）</p>
        </div>

        <!-- 每秒/每分钟合并行 -->
        <div class="rate-row">
            <div class="rate-item">
                <span class="rate-label">每秒赚</span>
                <span class="rate-value" id="perSecond">¥0.00</span>
            </div>
            <div class="rate-item">
                <span class="rate-label">每分钟赚</span>
                <span class="rate-value" id="perMinute">¥0.00</span>
            </div>
        </div>

        <!-- 攒钱目标模块 -->
        <div class="card" style="padding-bottom: 10px;">
            <div class="section-title">🎯 攒钱目标</div>
            <div id="goalList"></div>
            <button class="add-btn" id="addGoalBtn">+ 添加商品</button>
        </div>

        <div class="footnote">所有设置自动保存 · 花钱前看一眼</div>
    </div>

    <script>
        (function() {
            // ----- DOM 元素 -----
            const monthlySalaryInput = document.getElementById('monthlySalary');
            const perSecondSpan = document.getElementById('perSecond');
            const perMinuteSpan = document.getElementById('perMinute');
            const accumulatedSpan = document.getElementById('accumulatedAmount');
            const startTimeInput = document.getElementById('startTimeInput');
            const goalListDiv = document.getElementById('goalList');
            const addGoalBtn = document.getElementById('addGoalBtn');
            const toast = document.getElementById('toast');

            // ----- 常量 -----
            const SECONDS_PER_MONTH = 30 * 24 * 3600;

            // ----- 本地存储键名 -----
            const STORAGE_KEYS = {
                monthlySalary: 'daoshou_monthlySalary',
                startTime: 'daoshou_startTime',
                goals: 'daoshou_goals',
            };

            let timerInterval = null;
            let goals = [];
            let nextId = 100;

            function showToast(message) {
                toast.innerText = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            function formatDateTimeForInput(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${year}-${month}-${day}T${hours}:${minutes}`;
            }

            function getStartTime() {
                const saved = localStorage.getItem(STORAGE_KEYS.startTime);
                if (saved) {
                    const d = new Date(saved);
                    if (!isNaN(d.getTime())) return d;
                }
                const defaultStart = new Date();
                defaultStart.setHours(0, 0, 0, 0);
                return defaultStart;
            }

            function loadSettings() {
                if (localStorage.getItem(STORAGE_KEYS.monthlySalary)) {
                    monthlySalaryInput.value = localStorage.getItem(STORAGE_KEYS.monthlySalary);
                }
                const start = getStartTime();
                startTimeInput.value = formatDateTimeForInput(start);

                const savedGoals = localStorage.getItem(STORAGE_KEYS.goals);
                if (savedGoals) {
                    try {
                        goals = JSON.parse(savedGoals);
                        goals = goals.map(g => ({ ...g, id: g.id || nextId++ }));
                    } catch (e) {
                        goals = [];
                    }
                } else {
                    goals = [
                        { id: nextId++, name: 'Switch', price: 2500 },
                        { id: nextId++, name: 'iPhone 15', price: 8000 },
                    ];
                }
                renderGoals();
            }

            function saveSettings() {
                localStorage.setItem(STORAGE_KEYS.monthlySalary, monthlySalaryInput.value);
                localStorage.setItem(STORAGE_KEYS.goals, JSON.stringify(goals));
                if (startTimeInput.value) {
                    localStorage.setItem(STORAGE_KEYS.startTime, new Date(startTimeInput.value).toISOString());
                }
            }

            function getPerSecondRate() {
                const monthly = parseFloat(monthlySalaryInput.value) || 0;
                return monthly / SECONDS_PER_MONTH;
            }

            function getAccumulatedSinceStart() {
                const startTimeStr = startTimeInput.value;
                if (!startTimeStr) return 0;
                const startDate = new Date(startTimeStr);
                if (isNaN(startDate.getTime())) return 0;
                const now = new Date();
                const secondsPassed = Math.max(0, Math.floor((now - startDate) / 1000));
                return getPerSecondRate() * secondsPassed;
            }

            function updateAccumulated() {
                const accumulated = getAccumulatedSinceStart();
                accumulatedSpan.innerText = '¥' + accumulated.toFixed(2);
                updateAllGoalCards(accumulated);
            }

            function updateRates() {
                const perSecond = getPerSecondRate();
                perSecondSpan.innerText = '¥' + perSecond.toFixed(2);
                perMinuteSpan.innerText = '¥' + (perSecond * 60).toFixed(2);
            }

            function getPriceColorClass(price, monthlySalary) {
                if (monthlySalary <= 0) return 'green';
                const ratio = (price / monthlySalary) * 100;
                if (ratio >= 10) return 'red';
                if (ratio >= 5) return 'yellow';
                return 'green';
            }

            function updateAllGoalCards(accumulated) {
                const monthlySalary = parseFloat(monthlySalaryInput.value) || 0;
                goals.forEach(goal => {
                    const card = document.querySelector(`.goal-card[data-id="${goal.id}"]`);
                    if (!card) return;
                    const price = goal.price || 0;
                    const percent = price > 0 ? Math.min(100, (accumulated / price) * 100) : 0;
                    const hours = price > 0 ? (price / getPerSecondRate() / 3600) : 0;
                    const h = Math.floor(hours);
                    const m = Math.round((hours - h) * 60);
                    const timeStr = (price === 0) ? '0 小时 0 分钟' : `${h} 小时 ${m} 分钟`;

                    const progress = card.querySelector('progress');
                    if (progress) {
                        progress.value = percent;
                        progress.nextElementSibling.innerText = percent.toFixed(1) + '%';
                    }

                    const statsSpan = card.querySelector('.goal-stats span:first-child');
                    if (statsSpan) {
                        statsSpan.innerText = `已赚: ¥${accumulated.toFixed(2)} / ¥${price.toFixed(2)}`;
                    }

                    const worktimeSpan = card.querySelector('.goal-worktime');
                    if (worktimeSpan) {
                        worktimeSpan.innerText = `⏱️ ${timeStr}`;
                    }

                    const colorClass = getPriceColorClass(price, monthlySalary);
                    card.className = `goal-card ${colorClass}`;
                    card.setAttribute('data-id', goal.id);
                });
            }

            function filterPriceInput(value) {
                let filtered = value.replace(/[^\d.]/g, '');
                const parts = filtered.split('.');
                if (parts.length > 2) {
                    filtered = parts[0] + '.' + parts.slice(1).join('');
                }
                return filtered;
            }

            function renderGoals() {
                const accumulated = getAccumulatedSinceStart();
                const monthlySalary = parseFloat(monthlySalaryInput.value) || 0;
                let html = '';
                goals.forEach(goal => {
                    const price = goal.price || 0;
                    const percent = price > 0 ? Math.min(100, (accumulated / price) * 100) : 0;
                    const hours = price > 0 ? (price / getPerSecondRate() / 3600) : 0;
                    const h = Math.floor(hours);
                    const m = Math.round((hours - h) * 60);
                    const timeStr = (price === 0) ? '0 小时 0 分钟' : `${h} 小时 ${m} 分钟`;
                    const colorClass = getPriceColorClass(price, monthlySalary);

                    html += `
                        <div class="goal-card ${colorClass}" data-id="${goal.id}">
                            <div class="goal-header">
                                <input type="text" class="goal-name" value="${escapeHtml(goal.name)}" placeholder="商品名称">
                                <input type="text" class="goal-price" value="${price}" inputmode="numeric" data-id="${goal.id}" placeholder="价格">
                                <button class="delete-btn" onclick="deleteGoal(${goal.id})">✕</button>
                            </div>
                            <div class="goal-progress-row">
                                <progress value="${percent}" max="100">${percent}%</progress>
                                <span class="goal-percent">${percent.toFixed(1)}%</span>
                            </div>
                            <div class="goal-stats">
                                <span>已赚: ¥${accumulated.toFixed(2)} / ¥${price.toFixed(2)}</span>
                                <span class="goal-worktime">⏱️ ${timeStr}</span>
                            </div>
                        </div>
                    `;
                });
                goalListDiv.innerHTML = html;

                document.querySelectorAll('.goal-name').forEach((input, index) => {
                    input.addEventListener('input', (e) => {
                        goals[index].name = e.target.value;
                        saveSettings();
                    });
                });

                document.querySelectorAll('.goal-price').forEach(input => {
                    input.addEventListener('input', function(e) {
                        const rawValue = e.target.value;
                        const filtered = filterPriceInput(rawValue);
                        if (filtered !== rawValue) {
                            e.target.value = filtered;
                            showToast('仅支持输入数字');
                        }
                    });

                    input.addEventListener('blur', function(e) {
                        const id = parseInt(e.target.dataset.id);
                        const goal = goals.find(g => g.id === id);
                        if (!goal) return;

                        let newPrice = parseFloat(e.target.value);
                        if (isNaN(newPrice) || e.target.value.trim() === '' || newPrice <= 0) {
                            e.target.value = goal.price;
                            if (newPrice <= 0) {
                                showToast('价格必须大于0');
                            } else {
                                showToast('仅支持输入数字');
                            }
                            return;
                        }
                        if (newPrice !== goal.price) {
                            goal.price = newPrice;
                            saveSettings();
                            renderGoals();
                        }
                    });
                });
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }

            window.deleteGoal = function(id) {
                goals = goals.filter(g => g.id !== id);
                saveSettings();
                renderGoals();
            };

            function addGoal() {
                goals.push({
                    id: nextId++,
                    name: '新商品',
                    price: 1000,
                });
                saveSettings();
                renderGoals();
            }

            monthlySalaryInput.addEventListener('input', () => {
                updateRates();
                updateAccumulated();
                renderGoals();
                saveSettings();
            });
            startTimeInput.addEventListener('input', () => {
                updateAccumulated();
                saveSettings();
            });
            addGoalBtn.addEventListener('click', addGoal);

            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    updateAccumulated();
                }, 1000);
            }

            window.addEventListener('load', function() {
                loadSettings();
                updateRates();
                updateAccumulated();
                startTimer();
            });

            window.addEventListener('beforeunload', function() {
                if (timerInterval) clearInterval(timerInterval);
            });

            window.deleteGoal = deleteGoal;
        })();
    </script>
</body>
</html>
