<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>剁手计算器 · 翻页时钟版</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f3f1ed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            line-height: 1.5;
            color: #3e3a36;
        }
        .container {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            padding: 24px 18px 28px;
            border: 1px solid #e8e4da;
        }
        h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: #4a4540;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0dbd1;
            padding-bottom: 14px;
        }
        .card {
            background: #f9f7f4;
            border-radius: 18px;
            padding: 18px 16px;
            margin-bottom: 18px;
            border: 1px solid #ebe6df;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #6d6157;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }
        .accumulated-row {
            background: #f5f2ed;
            border-radius: 40px;
            padding: 16px 20px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2dbd2;
        }
        .accumulated-label {
            font-size: 16px;
            font-weight: 600;
            color: #6b5f54;
        }
        .accumulated-value {
            font-size: 28px;
            font-weight: 500;
            color: #4c6b5f;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .start-time-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            width: 100%;
            justify-content: space-between;
        }
        .start-time-row label {
            font-size: 13px;
            color: #7f7266;
            white-space: nowrap;
        }
        .start-time-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d7cec3;
            border-radius: 40px;
            font-size: 13px;
            background: white;
            color: #3e3a36;
        }
        .income-rate-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin: 8px 0 4px;
            padding: 0;
            background: none;
            border: none;
            gap: 6px;
            flex-wrap: wrap;
        }
        .rate-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 15px;
            color: #6f655b;
        }
        .rate-item .rate-label {
            font-weight: 400;
            color: #8f8276;
        }
        .rate-item .rate-value {
            font-weight: 500;
            color: #4f5d55;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .rate-hint {
            font-size: 11px;
            color: #b0a69b;
            font-weight: 400;
            white-space: nowrap;
        }

        /* 翻页数字样式 - 确保可见 */
        .flip-digit {
            display: inline-block;
            position: relative;
            width: 0.8em;
            height: 1.2em;
            line-height: 1.2em;
            text-align: center;
            background: transparent;
            perspective: 200px;
            vertical-align: baseline;
        }
        .flip-digit .digit-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
        }
        .flip-digit.flip .digit-wrapper {
            animation: flip 0.5s ease-out;
        }
        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(-180deg); }
            100% { transform: rotateX(-360deg); }
        }
        .flip-digit .top, .flip-digit .bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: inherit;
            backface-visibility: hidden;
            background-color: transparent;
            color: inherit;
        }
        .flip-digit .top {
            top: 0;
            line-height: 1.2em;
            transform-origin: bottom;
        }
        .flip-digit .bottom {
            bottom: 0;
            line-height: 0;
            transform-origin: top;
            transform: rotateX(180deg);
        }

        .goal-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 14px;
            margin-bottom: 14px;
            border: 1px solid #e9e2d9;
            transition: background 0.1s;
            position: relative;
        }
        .goal-card.green {
            background-color: #f6f9f4;
            border-left: 4px solid #b7c9b1;
        }
        .goal-card.yellow {
            background-color: #fcf9f0;
            border-left: 4px solid #e0cfb1;
        }
        .goal-card.red {
            background-color: #fdf5f2;
            border-left: 4px solid #e3bcb4;
        }
        .goal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            align-items: center;
            flex-wrap: wrap;
            padding-right: 30px;
            position: relative;
        }
        .goal-header input {
            flex: 1 1 40%;
            min-width: 120px;
            padding: 10px 14px;
            border: 1px solid #dbd3c9;
            border-radius: 40px;
            font-size: 14px;
            background: white;
        }
        .goal-header input:focus {
            border-color: #b7aa9c;
        }
        .delete-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: none;
            font-size: 22px;
            color: #bfb2a4;
            cursor: pointer;
            padding: 8px 8px 8px 12px;
            line-height: 1;
            transition: color 0.2s;
        }
        .delete-btn:hover {
            color: #a28e7c;
        }
        .goal-progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        progress {
            flex: 1;
            height: 8px;
            border-radius: 20px;
            overflow: hidden;
            background-color: #e4ddd4;
            border: none;
        }
        progress::-webkit-progress-bar {
            background-color: #e4ddd4;
            border-radius: 20px;
        }
        progress::-webkit-progress-value {
            background-color: #9faea5;
            border-radius: 20px;
        }
        progress::-moz-progress-bar {
            background-color: #9faea5;
            border-radius: 20px;
        }
        .goal-percent {
            font-size: 15px;
            font-weight: 400;
            color: #6f655b;
            min-width: 48px;
            text-align: right;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .goal-earned {
            font-size: 13px;
            color: #7f7368;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .goal-worktime {
            font-size: 13px;
            font-weight: 400;
            color: #7c6e62;
            background: #f0ebe5;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 4px;
            word-break: break-word;
            max-width: 100%;
        }
        .add-btn {
            background: #ffffff;
            border: 1px dashed #cbc1b5;
            border-radius: 40px;
            padding: 14px;
            width: 100%;
            font-size: 15px;
            color: #94897e;
            font-weight: 400;
            cursor: pointer;
            margin: 12px 0 8px;
            transition: background 0.2s;
        }
        .add-btn:hover {
            background: #f7f3ef;
            border-color: #b7aa9c;
        }
        .footnote {
            font-size: 12px;
            color: #b0a69b;
            text-align: center;
            margin-top: 24px;
            border-top: 1px solid #ece6de;
            padding-top: 16px;
        }
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(80, 70, 60, 0.9);
            color: #f0ebe4;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(2px);
            letter-spacing: 0.3px;
        }
        #toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="toast">仅支持输入数字</div>

    <div class="container" id="app">
        <h1>剁手计算器</h1>

        <!-- 累计收入 + 起始时间 -->
        <div class="accumulated-row">
            <div style="display: flex; flex-direction: column; width: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span class="accumulated-label">⏳ 累计收入</span>
                    <span class="accumulated-value" id="accumulatedAmount"><span>¥</span><span class="digits-container"></span></span>
                </div>
                <div class="start-time-row">
                    <label>📅 从</label>
                    <input type="datetime-local" id="startTimeInput">
                </div>
            </div>
        </div>

        <!-- 月薪设置卡片 -->
        <div class="card">
            <div class="section-title">⚙️ 月薪设置</div>
            <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 12px;">
                <label style="font-size:13px; font-weight:400; color:#7b6f64; white-space: nowrap;">💰 月薪（元）</label>
                <input type="number" id="monthlySalary" value="28000" min="0" step="1000"
                       style="flex: 1; min-width: 140px; padding: 12px 16px; font-size:15px; border:1px solid #dbd3c9; border-radius:40px; background:white; outline:none;">
            </div>

            <!-- 收入行：每分钟赚 + 小字 -->
            <div class="income-rate-row">
                <div class="rate-item">
                    <span class="rate-label">每分钟赚</span>
                    <span class="rate-value" id="perMinute"><span>¥</span><span class="digits-container"></span></span>
                </div>
                <span class="rate-hint">按月平均到每秒 (30天/月)</span>
            </div>
        </div>

        <!-- 攒钱目标模块 -->
        <div class="card" style="padding-bottom: 8px;">
            <div class="section-title">🎯 攒钱目标</div>
            <div id="goalList"></div>
            <button class="add-btn" id="addGoalBtn">+ 添加商品</button>
        </div>

        <div class="footnote">所有设置自动保存 · 花钱前看一眼</div>
    </div>

    <script>
        (function() {
            // ----- DOM 元素 -----
            const monthlySalaryInput = document.getElementById('monthlySalary');
            const perMinuteSpan = document.getElementById('perMinute').querySelector('.digits-container');
            const accumulatedSpan = document.getElementById('accumulatedAmount').querySelector('.digits-container');
            const startTimeInput = document.getElementById('startTimeInput');
            const goalListDiv = document.getElementById('goalList');
            const addGoalBtn = document.getElementById('addGoalBtn');
            const toast = document.getElementById('toast');

            // ----- 常量 -----
            const SECONDS_PER_MONTH = 30 * 24 * 3600;

            // ----- 本地存储键名 -----
            const STORAGE_KEYS = {
                monthlySalary: 'daoshou_monthlySalary',
                startTime: 'daoshou_startTime',
                goals: 'daoshou_goals',
            };

            let timerInterval = null;
            let goals = [];
            let nextId = 100;

            // ----- 翻页数字更新函数（修复版）-----
            function updateFlipDigits(container, newValue, decimals = 2, isCurrency = true) {
                if (!container) return;
                // 确保 newValue 是有效数字
                if (typeof newValue !== 'number' || isNaN(newValue)) {
                    newValue = 0;
                }
                // 格式化为字符串，包含小数点
                let numStr = newValue.toFixed(decimals);
                // 如果 isCurrency 为 true，强制保留两位小数（已经是这样）
                const digits = numStr.split('');

                // 获取当前已有的数字元素
                const existingDigits = Array.from(container.children).filter(child => child.classList.contains('flip-digit'));

                if (existingDigits.length !== digits.length) {
                    // 长度不同，完全重建
                    container.innerHTML = '';
                    digits.forEach((char) => {
                        const digitEl = document.createElement('span');
                        digitEl.className = 'flip-digit';
                        digitEl.innerHTML = `
                            <span class="digit-wrapper">
                                <span class="top">${char}</span>
                                <span class="bottom">${char}</span>
                            </span>
                        `;
                        container.appendChild(digitEl);
                    });
                } else {
                    // 长度相同，逐位比较并触发动画
                    digits.forEach((char, index) => {
                        const digitEl = existingDigits[index];
                        const top = digitEl.querySelector('.top');
                        const bottom = digitEl.querySelector('.bottom');
                        if (!top || !bottom) return;

                        const oldChar = top.textContent;
                        if (oldChar !== char) {
                            // 触发翻页动画
                            digitEl.classList.add('flip');
                            setTimeout(() => {
                                digitEl.classList.remove('flip');
                            }, 500);
                            // 更新数字
                            top.textContent = char;
                            bottom.textContent = char;
                        }
                    });
                }
            }

            // ----- 辅助函数 -----
            function showToast(message) {
                toast.innerText = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            function formatDateTimeForInput(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${year}-${month}-${day}T${hours}:${minutes}`;
            }

            function getStartTime() {
                const saved = localStorage.getItem(STORAGE_KEYS.startTime);
                if (saved) {
                    const d = new Date(saved);
                    if (!isNaN(d.getTime())) return d;
                }
                const defaultStart = new Date();
                defaultStart.setHours(0, 0, 0, 0);
                return defaultStart;
            }

            function loadSettings() {
                if (localStorage.getItem(STORAGE_KEYS.monthlySalary)) {
                    monthlySalaryInput.value = localStorage.getItem(STORAGE_KEYS.monthlySalary);
                }
                const start = getStartTime();
                startTimeInput.value = formatDateTimeForInput(start);

                const savedGoals = localStorage.getItem(STORAGE_KEYS.goals);
                if (savedGoals) {
                    try {
                        goals = JSON.parse(savedGoals);
                        goals = goals.map(g => ({ ...g, id: g.id || nextId++ }));
                    } catch (e) {
                        goals = [];
                    }
                } else {
                    goals = [
                        { id: nextId++, name: 'iPad', price: 6999 },
                        { id: nextId++, name: 'iPhone 15', price: 8000 },
                    ];
                }
                renderGoals();
            }

            function saveSettings() {
                localStorage.setItem(STORAGE_KEYS.monthlySalary, monthlySalaryInput.value);
                localStorage.setItem(STORAGE_KEYS.goals, JSON.stringify(goals));
                if (startTimeInput.value) {
                    localStorage.setItem(STORAGE_KEYS.startTime, new Date(startTimeInput.value).toISOString());
                }
            }

            // ----- 计算每秒收入 -----
            function getPerSecondRate() {
                const monthly = parseFloat(monthlySalaryInput.value) || 0;
                return monthly / SECONDS_PER_MONTH;
            }

            // ----- 计算累计收入 -----
            function getAccumulatedSinceStart() {
                const startTimeStr = startTimeInput.value;
                if (!startTimeStr) return 0;
                const startDate = new Date(startTimeStr);
                if (isNaN(startDate.getTime())) return 0;
                const now = new Date();
                const secondsPassed = Math.max(0, Math.floor((now - startDate) / 1000));
                return getPerSecondRate() * secondsPassed;
            }

            // ----- 更新累计显示（使用翻页动画）-----
            function updateAccumulated() {
                const accumulated = getAccumulatedSinceStart();
                updateFlipDigits(accumulatedSpan, accumulated, 2, true);
                updateAllGoalCards(accumulated);
            }

            // ----- 更新每分钟显示（使用翻页动画）-----
            function updatePerMinute() {
                const perSecond = getPerSecondRate();
                const perMinute = perSecond * 60;
                updateFlipDigits(perMinuteSpan, perMinute, 2, true);
            }

            // ----- 颜色分级逻辑 -----
            function getPriceColorClass(price, monthlySalary) {
                if (monthlySalary <= 0) return 'green';
                const ratio = (price / monthlySalary) * 100;
                if (ratio >= 10) return 'red';
                if (ratio >= 5) return 'yellow';
                return 'green';
            }

            // ----- 格式化工作时间（天/小时/分钟）-----
            function formatWorkTime(totalHours) {
                if (totalHours <= 0) return '0分钟';
                const days = Math.floor(totalHours / 24);
                const hours = Math.floor(totalHours % 24);
                const minutes = Math.round((totalHours - Math.floor(totalHours)) * 60);

                let parts = [];
                if (days > 0) parts.push(days + '天');
                if (hours > 0) parts.push(hours + '小时');
                if (minutes > 0) parts.push(minutes + '分钟');
                if (parts.length === 0) return '0分钟';
                return parts.join('');
            }

            // ----- 更新所有商品卡片的动态数据（百分比用翻页动画）-----
            function updateAllGoalCards(accumulated) {
                const monthlySalary = parseFloat(monthlySalaryInput.value) || 0;
                goals.forEach(goal => {
                    const card = document.querySelector(`.goal-card[data-id="${goal.id}"]`);
                    if (!card) return;
                    const price = goal.price || 0;
                    const percent = price > 0 ? Math.min(100, (accumulated / price) * 100) : 0;
                    const totalHours = price > 0 ? (price / getPerSecondRate() / 3600) : 0;
                    const timeStr = formatWorkTime(totalHours);

                    // 更新进度条值
                    const progress = card.querySelector('progress');
                    if (progress) {
                        progress.value = percent;
                    }

                    // 百分比数字使用翻页动画
                    const percentSpan = card.querySelector('.goal-percent');
                    if (percentSpan) {
                        const percentContainer = percentSpan.querySelector('.digits-container');
                        if (percentContainer) {
                            updateFlipDigits(percentContainer, percent, 1, false);
                        }
                    }

                    // 已赚金额直接更新
                    const earnedSpan = card.querySelector('.goal-earned');
                    if (earnedSpan) {
                        earnedSpan.innerText = `已赚: ¥${accumulated.toFixed(2)} / ¥${price.toFixed(2)}`;
                    }

                    // 工作时间文本
                    const worktimeSpan = card.querySelector('.goal-worktime');
                    if (worktimeSpan) {
                        worktimeSpan.innerText = `相当于工作 ${timeStr}`;
                    }

                    // 更新颜色类
                    const colorClass = getPriceColorClass(price, monthlySalary);
                    card.className = `goal-card ${colorClass}`;
                    card.setAttribute('data-id', goal.id);
                });
            }

            // ----- 过滤价格输入（只允许数字和小数点）-----
            function filterPriceInput(value) {
                let filtered = value.replace(/[^\d.]/g, '');
                const parts = filtered.split('.');
                if (parts.length > 2) {
                    filtered = parts[0] + '.' + parts.slice(1).join('');
                }
                return filtered;
            }

            // ----- 渲染商品列表（首次或增删时调用）-----
            function renderGoals() {
                const accumulated = getAccumulatedSinceStart();
                const monthlySalary = parseFloat(monthlySalaryInput.value) || 0;
                let html = '';
                goals.forEach(goal => {
                    const price = goal.price || 0;
                    const percent = price > 0 ? Math.min(100, (accumulated / price) * 100) : 0;
                    const totalHours = price > 0 ? (price / getPerSecondRate() / 3600) : 0;
                    const timeStr = formatWorkTime(totalHours);
                    const colorClass = getPriceColorClass(price, monthlySalary);

                    html += `
                        <div class="goal-card ${colorClass}" data-id="${goal.id}">
                            <div class="goal-header">
                                <input type="text" class="goal-name" value="${escapeHtml(goal.name)}" placeholder="商品名称">
                                <input type="text" class="goal-price" value="${price}" inputmode="numeric" data-id="${goal.id}" placeholder="价格">
                                <button class="delete-btn" onclick="deleteGoal(${goal.id})">✕</button>
                            </div>
                            <div class="goal-progress-row">
                                <progress value="${percent}" max="100">${percent}%</progress>
                                <span class="goal-percent"><span class="digits-container"></span>%</span>
                            </div>
                            <div class="goal-earned">已赚: ¥${accumulated.toFixed(2)} / ¥${price.toFixed(2)}</div>
                            <div class="goal-worktime">相当于工作 ${timeStr}</div>
                        </div>
                    `;
                });
                goalListDiv.innerHTML = html;

                // 初始化每个商品卡片的百分比数字
                document.querySelectorAll('.goal-card').forEach((card, index) => {
                    const percentSpan = card.querySelector('.goal-percent');
                    const percentContainer = percentSpan.querySelector('.digits-container');
                    const percent = goals[index] ? (goals[index].price > 0 ? Math.min(100, (accumulated / goals[index].price) * 100) : 0) : 0;
                    if (percentContainer) {
                        updateFlipDigits(percentContainer, percent, 1, false);
                    }
                });

                // 绑定商品名称输入事件
                document.querySelectorAll('.goal-name').forEach((input, index) => {
                    input.addEventListener('input', (e) => {
                        goals[index].name = e.target.value;
                        saveSettings();
                    });
                });

                // 绑定价格输入事件
                document.querySelectorAll('.goal-price').forEach(input => {
                    input.addEventListener('input', function(e) {
                        const rawValue = e.target.value;
                        const filtered = filterPriceInput(rawValue);
                        if (filtered !== rawValue) {
                            e.target.value = filtered;
                            showToast('仅支持输入数字');
                        }
                    });

                    input.addEventListener('blur', function(e) {
                        const id = parseInt(e.target.dataset.id);
                        const goal = goals.find(g => g.id === id);
                        if (!goal) return;

                        let newPrice = parseFloat(e.target.value);
                        if (isNaN(newPrice) || e.target.value.trim() === '' || newPrice <= 0) {
                            e.target.value = goal.price;
                            if (newPrice <= 0) {
                                showToast('价格必须大于0');
                            } else {
                                showToast('仅支持输入数字');
                            }
                            return;
                        }
                        if (newPrice !== goal.price) {
                            goal.price = newPrice;
                            saveSettings();
                            renderGoals(); // 重新渲染以更新颜色和时间
                        }
                    });
                });
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }

            // ----- 删除商品 -----
            window.deleteGoal = function(id) {
                goals = goals.filter(g => g.id !== id);
                saveSettings();
                renderGoals();
            };

            // ----- 添加商品 -----
            function addGoal() {
                goals.push({
                    id: nextId++,
                    name: '新商品',
                    price: 1000,
                });
                saveSettings();
                renderGoals();
            }

            // ----- 事件绑定 -----
            monthlySalaryInput.addEventListener('input', () => {
                updatePerMinute();
                updateAccumulated();
                renderGoals();
                saveSettings();
            });
            startTimeInput.addEventListener('input', () => {
                updateAccumulated();
                saveSettings();
            });
            addGoalBtn.addEventListener('click', addGoal);

            // ----- 定时器每秒更新累计收入 -----
            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    updateAccumulated();
                }, 1000);
            }

            // ----- 初始化 -----
            window.addEventListener('load', function() {
                loadSettings();
                // 确保初始数字显示
                updatePerMinute();
                updateAccumulated();
                startTimer();
            });

            window.addEventListener('beforeunload', function() {
                if (timerInterval) clearInterval(timerInterval);
            });

            window.deleteGoal = deleteGoal;
        })();
    </script>
</body>
</html>
